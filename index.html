<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おお</title>
  <style>
    :root {
      color-scheme: light;
      --bg-1: #020611;
      --bg-2: #081426;
      --glow: rgba(255, 255, 255, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(255, 220, 120, 0.08), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
    }

    .logo {
      position: relative;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 2.5rem);
      isolation: isolate;
      user-select: none;
    }

    .wave-text {
      grid-area: 1 / 1;
      margin: 0;
      font-size: clamp(4rem, 18vw, 10rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      animation:
        rainbow 2.8s linear infinite,
        bob 1.8s ease-in-out infinite;
      transform-origin: center;
    }

    .wave-text.front {
      position: relative;
      z-index: 2;
      text-shadow:
        0 0 12px var(--glow),
        0 0 30px rgba(255, 255, 255, 0.18);
    }

    .wave-text.glow {
      z-index: 1;
      opacity: 0.88;
      filter: blur(18px) saturate(1.4);
      mix-blend-mode: screen;
      text-shadow:
        0 0 24px currentColor,
        0 0 52px currentColor,
        0 0 90px currentColor,
        -0.24em 0 60px rgba(255, 120, 60, 0.6),
        0.24em 0 60px rgba(255, 90, 210, 0.6);
    }

    @keyframes rainbow {
      0% { color: hsl(0 100% 62%); }
      16% { color: hsl(45 100% 62%); }
      33% { color: hsl(110 100% 62%); }
      50% { color: hsl(190 100% 62%); }
      66% { color: hsl(255 100% 70%); }
      83% { color: hsl(315 100% 68%); }
      100% { color: hsl(360 100% 62%); }
    }

    @keyframes bob {
      0%, 100% {
        transform: translateY(0) rotate(-2deg) scale(1);
      }
      25% {
        transform: translateY(-18px) rotate(2deg) scale(1.04);
      }
      50% {
        transform: translateY(0) rotate(-1deg) scale(0.98);
      }
      75% {
        transform: translateY(18px) rotate(2deg) scale(1.04);
      }
    }
  </style>
</head>
<body>
  <audio id="bgm" src="./assets/f.m4a" preload="auto" autoplay></audio>
  <div class="logo" aria-label="うおｗ">
    <h1 class="wave-text glow" aria-hidden="true">うおｗ</h1>
    <h1 class="wave-text front">うおｗ</h1>
  </div>
  <script>
    const bgm = document.getElementById("bgm");

    async function tryPlayBgm() {
      if (!bgm) {
        return;
      }

      try {
        await bgm.play();
        removeRetryHandlers();
      } catch {
        addRetryHandlers();
      }
    }

    function addRetryHandlers() {
      window.addEventListener("pointerdown", tryPlayBgm, { once: true });
      window.addEventListener("keydown", tryPlayBgm, { once: true });
      window.addEventListener("touchstart", tryPlayBgm, { once: true });
    }

    function removeRetryHandlers() {
      window.removeEventListener("pointerdown", tryPlayBgm);
      window.removeEventListener("keydown", tryPlayBgm);
      window.removeEventListener("touchstart", tryPlayBgm);
    }

    window.addEventListener("load", tryPlayBgm, { once: true });
  </script>
</body>
</html>
